<div class="chatbot-mobile-backdrop" [class.show]="isOpen"></div>
<div class="chatbot-fab" *ngIf="!isOpen && chatEnabled" (click)="toggleChat()">
  <span style="font-size: 28px; line-height: 1;">💬</span>
</div>

<div class="chatbot-container" [class.open]="isOpen">
    <div class="chatbot-header" (click)="toggleChat()">
        <span class="chatbot-title">✨ 友善小精靈</span>
        <button class="toggle-btn" (click)="toggleChat($event)">
            ✕
        </button>
    </div>

    <div #chatBody class="chatbot-body" (scroll)="onChatScroll()">
        <div *ngFor="let msg of messages" [ngClass]="msg.sender">
            <span *ngIf="msg.sender === 'user'" class="text-gray-700">{{ msg.text }}</span>
            <div *ngIf="msg.sender === 'bot' && !msg.isLoading" class="bot-message">
                <span [innerHTML]="msg.safeHtml || msg.text"></span>
            </div>
            <span *ngIf="msg.sender === 'bot' && msg.isLoading" class="bot-message loading-text">
                {{ msg.text }}
            </span>
        </div>
        <!-- Suggested Replies -->
        <div class="chatbot-presets" *ngIf="suggestedReplies.length > 0">
            <button *ngFor="let reply of suggestedReplies" class="preset-btn" (click)="sendPreset(reply)">
                {{ reply }}
            </button>
        </div>
    </div>

    <!-- Scroll Bottom Button -->
    <button *ngIf="showScrollBottom" class="scroll-bottom-btn" (click)="scrollToBottom()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
        <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
      </svg>
    </button>

    <div class="chatbot-footer">
        <input type="text"
            [(ngModel)]="userInput"
            [disabled]="messages[messages.length - 1].isLoading || false"
            (keydown.enter)="handleEnter($event)" [placeholder]="messages[messages.length - 1].isLoading || false ? '請稍後...' : '請輸入訊息'"
        >
        <button (click)="sendMessage()">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
    </div>
</div>
