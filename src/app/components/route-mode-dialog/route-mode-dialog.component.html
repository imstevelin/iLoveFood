<div class="p-6 md:p-8 flex flex-col items-center justify-center text-center relative overflow-hidden bg-white/20 dark:bg-transparent">
  
  <!-- Icon & Title -->
  <div class="mb-6 flex flex-col items-center animate-fade-in-up">
    <div class="w-16 h-16 rounded-3xl bg-gradient-to-br from-blue-500 to-indigo-600 shadow-xl shadow-blue-500/20 flex items-center justify-center mb-5 ring-4 ring-white/30">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256">
        <path d="M228.92,49.69a8,8,0,0,0-6.86-1.45L160.93,63.52,99.58,32.84a8,8,0,0,0-7.16,0L27.08,65.18A8,8,0,0,0,24,72.35V206.31a8,8,0,0,0,10.92,7.45l61.15-15.29,61.35,30.68a8,8,0,0,0,7.16,0l65.34-32.34A8,8,0,0,0,232,189.65V56.35A8,8,0,0,0,228.92,49.69ZM96,49.33l56,28V206.67l-56-28ZM40,78.22l40-18.46V187.12L40,197.12Zm176,99.56-40,19.8V88.88l40-10Z"></path>
      </svg>
    </div>
    <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 m-0">分析導航路線</h2>
    <p class="text-[14px] text-slate-500 dark:text-slate-300 mt-2 mb-0 px-2 leading-relaxed font-medium">請選擇交通工具以便推薦最順路的門市。</p>
  </div>

  <!-- Product Keyword Search Box -->
  <div class="w-full px-2 mb-4">
    <div class="route-search-box">
      <!-- 放大鏡 icon：固定在左側不會被擠壓 -->
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 256 256"
        class="route-search-icon">
        <path
          d="M229.66,218.34l-50.07-50.06a88.11,88.11,0,1,0-11.31,11.31l50.06,50.07a8,8,0,0,0,11.32-11.32ZM40,112a72,72,0,1,1,72,72A72.08,72.08,0,0,1,40,112Z">
        </path>
      </svg>

      <!-- Chips + Input 區域：可換行、不會溢出 -->
      <div class="route-search-chips-area">
        <mat-chip-grid #chipGrid aria-label="商品多項選擇" class="route-chip-grid">
          <mat-chip-row *ngFor="let keyword of selectedKeywords" (removed)="removeKeyword(keyword)"
            class="route-chip">
            <span class="route-chip-text">{{ keyword }}</span>
            <button matChipRemove aria-label="移除關鍵字">
              <mat-icon class="route-chip-remove-icon">cancel</mat-icon>
            </button>
          </mat-chip-row>
          
          <input placeholder="可選：搜尋欲過濾之商品或種類..."
                 #keywordInput
                 [formControl]="keywordCtrl"
                 [matChipInputFor]="chipGrid"
                 [matAutocomplete]="auto"
                 [matChipInputSeparatorKeyCodes]="separatorKeysCodes"
                 (matChipInputTokenEnd)="addToken($event)"
                 class="route-search-input" />
        </mat-chip-grid>
      </div>
      
      <mat-autocomplete #auto="matAutocomplete" (optionSelected)="selected($event)" class="route-autocomplete-panel">
        <mat-option *ngFor="let option of filteredOptions$ | async" [value]="option.name" class="route-autocomplete-option">
          <div *ngIf="option.type === 'category'" class="flex items-center gap-2 py-1">
            <span class="text-xs px-1.5 py-0.5 rounded-md bg-green-50 text-green-600">📂</span>
            <div class="flex flex-col">
              <span class="text-sm">{{ option.name }}</span>
              <span class="text-xs text-gray-400 dark:text-zinc-400 leading-none">{{ option.addr }}</span>
            </div>
          </div>
          <div *ngIf="option.type === 'product'" class="flex items-center gap-2 py-1">
            <span class="text-xs px-1.5 py-0.5 rounded-md bg-orange-50 text-orange-600">🍱</span>
            <div class="flex flex-col">
              <span class="text-sm">{{ option.name }}</span>
              <span class="text-xs text-gray-400 dark:text-zinc-400 leading-none">{{ option.addr }}</span>
            </div>
          </div>
        </mat-option>
      </mat-autocomplete>
    </div>
  </div>

  <!-- Mode Selection Buttons -->
  <div class="flex gap-4 w-full mt-2">
    <!-- Motorcycle Option -->
    <button mat-button class="mode-btn flex-1 p-0 overflow-hidden group" (click)="selectMode('BICYCLING')">
      <div class="flex flex-col items-center gap-2 py-5 transition-transform duration-300 group-active:scale-95">
        <span class="text-4xl filter drop-shadow-sm">🛵</span>
        <span class="font-bold text-slate-700 dark:text-slate-200 text-sm">機車</span>
      </div>
    </button>
    
    <!-- Car Option -->
    <button mat-button class="mode-btn flex-1 p-0 overflow-hidden group" (click)="selectMode('DRIVING')">
      <div class="flex flex-col items-center gap-2 py-5 transition-transform duration-300 group-active:scale-95">
        <span class="text-4xl filter drop-shadow-sm">🚗</span>
        <span class="font-bold text-slate-700 dark:text-slate-200 text-sm">汽車</span>
      </div>
    </button>
  </div>
  
  <button mat-button 
          class="dialog-cancel-btn w-full mt-4 py-3 rounded-xl text-[15px] font-medium text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 active:scale-95 transition-all" 
          style="background: transparent; border: none; box-shadow: none;"
          (click)="onCancel()">
    取消
  </button>
</div>
